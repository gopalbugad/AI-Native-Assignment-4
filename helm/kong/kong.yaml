_format_version: "3.0"

consumers:
  - username: user-service-consumer
    jwt_secrets:
      - key: user-service
        secret: ${JWT_SECRET}
        algorithm: HS256

services:
  - name: user-service
    url: http://user-service:8000
    routes:
      - name: health-direct
        paths:
          - /health
        strip_path: false

      - name: login-direct
        paths:
          - /login
        strip_path: false

      - name: verify-direct
        paths:
          - /verify
        strip_path: false

      - name: users-protected
        paths:
          - /users
        strip_path: false
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp

          - name: rate-limiting
            config:
              minute: 10
              policy: local
              limit_by: ip
          - name: ip-restriction
            config:
              allow:
                - 202.148.58.59/32
                - 172.31.0.0/16